<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Editor | Devi Sri Delights</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e65100">

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f8; margin: 0; padding: 20px; }
        
        /* Login Screen */
        #login-screen { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; border-top: 5px solid #e65100; }
        #login-screen h2 { font-family: 'Playfair Display', serif; color: #333; margin-top: 0; }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        .login-btn { width: 100%; background: #e65100; color: white; border: none; padding: 12px; font-size: 1.1rem; font-weight: bold; border-radius: 6px; cursor: pointer; }
        #error-msg { color: #d32f2f; margin-top: 10px; font-size: 0.9rem; }

        /* Dashboard */
        #dashboard-screen { display: none; max-width: 1000px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #111, #2c3e50); color: #f8c471; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header h1 { margin: 0; font-family: 'Playfair Display', serif; }
        .header p { margin: 5px 0 0 0; opacity: 0.9; }
        .logout-btn { background: #ff4d4d; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* Migration Warning */
        #migration-banner { background: #fff3cd; border-left: 5px solid #ff9800; padding: 15px; margin-bottom: 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .migrate-btn { background: #ff9800; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* Menu Grid */
        #menu-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .category-card { background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow: hidden; border-top: 4px solid #f8c471; }
        .category-header { background: #2c3e50; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .category-header h3 { margin: 0; font-family: 'Playfair Display', serif; }
        
        /* Category Action Buttons */
        .cat-actions { display: flex; gap: 8px; align-items: center; }
        .move-btn { background: #455a64; color: white; border: none; border-radius: 4px; padding: 5px 8px; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
        .move-btn:hover:not(:disabled) { background: #607d8b; }
        .move-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .del-btn { background: #ff4d4d; color: white; border: none; border-radius: 4px; padding: 5px 8px; cursor: pointer; font-size: 0.8rem; margin-left: 5px; }
        
        .item-list { padding: 15px; }
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .menu-item:last-child { border-bottom: none; }
        .item-name { font-weight: bold; color: #333; }
        .item-price { color: #e65100; font-weight: bold; background: #fff3e0; padding: 3px 8px; border-radius: 4px; cursor: pointer; }
        .add-item-btn { width: calc(100% - 30px); margin: 0 15px 15px 15px; background: #25D366; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .add-cat-btn { display: block; width: 100%; background: #333; color: #f8c471; border: none; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; text-transform: uppercase; }

        /* Floating App Download Button */
        .floating-app-bar {
            position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000;
        }
        .float-btn {
            background: #2c3e50; color: white; border: none; padding: 12px 20px; border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.3s;
        }
        .float-btn:hover { background: #1a252f; transform: translateY(-2px); }
        #download-float { background: #e65100; display: none; }
        #download-float:hover { background: #cc4800; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>📋 Menu Editor</h2>
        <input type="email" id="email-input" class="login-input" placeholder="Admin Email">
        <input type="password" id="password-input" class="login-input" placeholder="Password">
        <button class="login-btn" onclick="attemptLogin()">Log In</button>
        <div id="error-msg"></div>
    </div>

    <div id="dashboard-screen">
        <div class="header">
            <div>
                <h1>📋 Menu Editor</h1>
                <p>Live update your app's menu</p>
            </div>
            <button class="logout-btn" onclick="attemptLogout()">Logout</button>
        </div>

        <div id="migration-banner" style="display: none;">
            <div><strong>⚠️ First Time Setup:</strong> Your database menu is empty! Click here to import your default menu.</div>
            <button class="migrate-btn" onclick="migrateMenuToFirebase()">Import Menu Now</button>
        </div>

        <div id="menu-container"></div>
        <button class="add-cat-btn" onclick="addNewCategory()">+ Add New Category</button>
    </div>

    <div class="floating-app-bar">
        <button id="download-float" class="float-btn">📱 Download App</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc, updateDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC7uuy0yYV3L17RJ0RvbN-mrfqrT4PquMo",
            authDomain: "devi-sri-delights.firebaseapp.com",
            projectId: "devi-sri-delights",
            storageBucket: "devi-sri-delights.firebasestorage.app",
            messagingSenderId: "73108349440",
            appId: "1:73108349440:web:8ca038c61c9a85b2b12ee5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let liveCategories = [];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('dashboard-screen').style.display = 'block';
                loadMenuEditor();
            } else {
                document.getElementById('login-screen').style.display = 'block';
                document.getElementById('dashboard-screen').style.display = 'none';
            }
        });

        window.attemptLogin = function() {
            const email = document.getElementById('email-input').value.trim();
            const password = document.getElementById('password-input').value.trim();
            signInWithEmailAndPassword(auth, email, password).catch(err => document.getElementById('error-msg').innerText = "Invalid credentials.");
        };
        window.attemptLogout = () => signOut(auth);

        function loadMenuEditor() {
            onSnapshot(collection(db, "menu"), (snapshot) => {
                const container = document.getElementById('menu-container');
                container.innerHTML = '';
                liveCategories = [];

                if (snapshot.empty) {
                    document.getElementById('migration-banner').style.display = 'flex';
                    return;
                }
                document.getElementById('migration-banner').style.display = 'none';

                snapshot.forEach(docSnap => {
                    const cat = docSnap.data();
                    cat.id = docSnap.id;
                    if(typeof cat.order === 'undefined') cat.order = 999; 
                    liveCategories.push(cat);
                });

                liveCategories.sort((a, b) => a.order - b.order);

                liveCategories.forEach((cat, index) => {
                    let itemsHTML = '';
                    cat.items.forEach((item, itemIndex) => {
                        let priceDisplay = isNaN(item.price) ? item.price : `₹${item.price}`;
                        itemsHTML += `
                            <div class="menu-item">
                                <span class="item-name">${item.name}</span>
                                <div>
                                    <span class="item-price" onclick="editPrice('${cat.id}', ${itemIndex}, '${item.price}')">${priceDisplay} ✏️</span>
                                    <button class="del-btn" onclick="deleteItem('${cat.id}', ${itemIndex})">X</button>
                                </div>
                            </div>
                        `;
                    });

                    // ADDED: The 🖼️ button inside .cat-actions
                    container.innerHTML += `
                        <div class="category-card">
                            <div class="category-header">
                                <h3>${cat.name}</h3>
                                <div class="cat-actions">
                                    <button class="move-btn" onclick="editCategoryImage('${cat.id}', '${cat.image || ''}')" title="Edit Image">🖼️</button>
                                    <button class="move-btn" onclick="moveCategoryUp(${index})" ${index === 0 ? 'disabled' : ''}>⬆️</button>
                                    <button class="move-btn" onclick="moveCategoryDown(${index})" ${index === liveCategories.length - 1 ? 'disabled' : ''}>⬇️</button>
                                    <button class="del-btn" onclick="deleteCategory('${cat.id}')">Delete</button>
                                </div>
                            </div>
                            <div class="item-list">${itemsHTML}</div>
                            <button class="add-item-btn" onclick="addItem('${cat.id}')">+ Add Item</button>
                        </div>
                    `;
                });
            });
        }

        // --- NEW: EDIT IMAGE FUNCTION ---
        window.editCategoryImage = async function(catId, currentImage) {
            let newImage = prompt("Enter new Image URL for this category:", currentImage);
            if (!newImage || newImage === currentImage) return; // Cancelled or unchanged
            
            // Update only the image field in Firebase
            await updateDoc(doc(db, "menu", catId), { image: newImage });
        };

        // --- FIXED ORDER POSITIONING FUNCTIONS ---
        window.moveCategoryUp = async function(index) {
            if (index <= 0) return;
            
            let safeArray = [...liveCategories];
            
            let temp = safeArray[index];
            safeArray[index] = safeArray[index - 1];
            safeArray[index - 1] = temp;

            let promises = [];
            safeArray.forEach((cat, newIndex) => {
                promises.push(updateDoc(doc(db, "menu", cat.id), { order: newIndex }));
            });
            await Promise.all(promises);
        };

        window.moveCategoryDown = async function(index) {
            if (index >= liveCategories.length - 1) return;
            
            let safeArray = [...liveCategories];
            
            let temp = safeArray[index];
            safeArray[index] = safeArray[index + 1];
            safeArray[index + 1] = temp;

            let promises = [];
            safeArray.forEach((cat, newIndex) => {
                promises.push(updateDoc(doc(db, "menu", cat.id), { order: newIndex }));
            });
            await Promise.all(promises);
        };

        // --- EDITOR FUNCTIONS ---
        window.addItem = async function(catId) {
            let name = prompt("Enter new item name:");
            if (!name) return;
            let price = prompt("Enter price (or type 'Shop Visit'):");
            if (!price) return;
            
            const cat = liveCategories.find(c => c.id === catId);
            cat.items.push({ name: name, price: isNaN(price) ? price : Number(price) });
            await setDoc(doc(db, "menu", catId), { name: cat.name, image: cat.image, items: cat.items, order: cat.order });
        };

        window.deleteItem = async function(catId, itemIndex) {
            if(!confirm("Delete this item?")) return;
            const cat = liveCategories.find(c => c.id === catId);
            cat.items.splice(itemIndex, 1);
            await setDoc(doc(db, "menu", catId), { name: cat.name, image: cat.image, items: cat.items, order: cat.order });
        };

        window.editPrice = async function(catId, itemIndex, oldPrice) {
            let newPrice = prompt("Enter new price (or 'Shop Visit'):", oldPrice);
            if (!newPrice || newPrice === oldPrice) return;
            
            const cat = liveCategories.find(c => c.id === catId);
            cat.items[itemIndex].price = isNaN(newPrice) ? newPrice : Number(newPrice);
            await setDoc(doc(db, "menu", catId), { name: cat.name, image: cat.image, items: cat.items, order: cat.order });
        };

        window.addNewCategory = async function() {
            let name = prompt("Enter Category Name (e.g., 'Desserts'):");
            if (!name) return;
            let image = prompt("Enter an Image URL for this category:");
            if (!image) return;
            
            let docId = name.toLowerCase().replace(/\s+/g, '-');
            await setDoc(doc(db, "menu", docId), { name: name, image: image, items: [], order: liveCategories.length });
        };

        window.deleteCategory = async function(catId) {
            if(confirm("Are you sure you want to delete this ENTIRE category?")) {
                await deleteDoc(doc(db, "menu", catId));
            }
        };

        // --- ONE TIME MIGRATION SCRIPT ---
        window.migrateMenuToFirebase = async function() {
            const defaultMenu = [
                { name: "Foods", image: "https://tse4.mm.bing.net/th/id/OIP.EEc_OHCl8Ls9SxecF-BXAAHaFj?rs=1&pid=ImgDetMain&o=7&rm=3", items: [{ name: "Chapati", price: 10 }, { name: "Jowar rotis", price: 15 }, { name: "Bajra roties", price: 20 }, { name: "Sambar", price: 20 }, { name: "Veg curries", price: 20 }, { name: "Chicken curry", price: "Shop Visit" }, { name: "Rice", price: 20 }, { name: "Idli", price: 35 }] },
                { name: "Thali", image: "https://images.unsplash.com/photo-1626777552726-4a6b54c97e46?q=80&w=1000&auto=format&fit=crop", items: [{ name: "Veg thali", price: 79 }, { name: "Non veg thali", price: 99 }, { name: "Unlimited buffet", price: 79 }] },
                { name: "Shakes", image: "https://images.unsplash.com/photo-1572490122747-3968b75cc699?q=80&w=1000&auto=format&fit=crop", items: [{ name: "Buttermilk", price: 10 }, { name: "Lassi", price: 20 }, { name: "Oreo milkshake", price: 79 }] },
                { name: "Cool Drinks", image: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?q=80&w=1000&auto=format&fit=crop", items: [{ name: "Red bull", price: 125 }, { name: "Monster energy", price: 125 }, { name: "Badam milk", price: 40 }, { name: "Predator", price: 60 }, { name: "Thums up", price: "Shop Visit" }, { name: "Sprite", price: "Shop Visit" }, { name: "Coca-cola", price: "Shop Visit" }, { name: "Limca", price: "Shop Visit" }, { name: "Sprite sugar free", price: "Shop Visit" }, { name: "Water bottles", price: "Shop Visit" }] },
                { name: "Ice Creams", image: "https://images.unsplash.com/photo-1505394033641-40c6ad1178d7?q=80&w=1000&auto=format&fit=crop", items: [{ name: "Vanilla", price: "Shop Visit" }, { name: "Strawberry", price: "Shop Visit" }, { name: "Choco chips", price: "Shop Visit" }, { name: "Honeymoon delight", price: "Shop Visit" }, { name: "Mango", price: "Shop Visit" }] },
                { name: "Sunday Specials", image: "https://tse3.mm.bing.net/th/id/OIP.KE-drO0MxumvxRq8P5nOnwHaEK?rs=1&pid=ImgDetMain&o=7&rm=3", items: [{ name: "Sunday cups (Tutti Frutti)", price: "Shop Visit" }, { name: "Chocolate flavour", price: "Shop Visit" }] },
                { name: "Items with Fruits", image: "https://images.unsplash.com/photo-1490474418585-ba9bad8fd0ea?q=80&w=1000&auto=format&fit=crop", items: [{ name: "Fruits bowl", price: "Shop Visit" }, { name: "Fruits juice", price: "Shop Visit" }, { name: "Sprouts", price: "Shop Visit" }] },
                { name: "Snacks", image: "sprouts.jpg.jpg", items: [{ name: "Pakodi", price: "Shop Visit" }, { name: "Sprouts", price: "Shop Visit" }] }
            ];

            document.querySelector('.migrate-btn').innerText = "Importing...";
            
            let orderIndex = 0;
            for (let cat of defaultMenu) {
                let docId = cat.name.toLowerCase().replace(/\s+/g, '-');
                cat.order = orderIndex++; 
                await setDoc(doc(db, "menu", docId), cat);
            }
            alert("Menu successfully imported to Database!");
        };
    </script>

    <script>
        // --- DOWNLOAD APP (PWA) LOGIC ---
        let deferredPrompt;
        const downloadBtn = document.getElementById('download-float');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            downloadBtn.style.display = 'block';
        });

        downloadBtn.addEventListener('click', async () => {
            if (deferredPrompt !== null) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                if(outcome === 'accepted') {
                    downloadBtn.style.display = 'none';
                }
            }
        });

        // --- SERVICE WORKER REGISTRATION ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
